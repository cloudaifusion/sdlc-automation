name: AWS Architecture Review

on:
  workflow_call:
    inputs:
      terraform_path:
        description: 'Path to Terraform files (e.g. infra/terraform/aws)'
        default: 'infra/terraform/aws'
        required: false
        type: string
      docs_path:
        description: 'Output folder for diagram and companion guide'
        default: 'docs'
        required: false
        type: string
      diagram_name:
        description: 'Base filename for diagram files (without extension)'
        default: 'architecture'
        required: false
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  architecture-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up shared tools
        run: |
          git clone https://github.com/cloudaifusion/sdlc-automation.git /tmp/sdlc-automation
          mkdir -p ~/.claude/skills
          cp -r /tmp/sdlc-automation/.claude/skills/* ~/.claude/skills/
          npm install -g @anthropic-ai/claude-code

      - name: Generate Terraform diff
        run: |
          TERRAFORM_PATH="${{ inputs.terraform_path }}" python3 /tmp/sdlc-automation/scripts/get_diff.py
          cat diff.json

      - name: Generate initial diagram if missing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DRAWIO_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.drawio"
          GUIDE_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.md"

          if [[ -f "$DRAWIO_FILE" ]]; then
            echo "Diagram already exists, skipping initial generation."
            exit 0
          fi

          echo "No diagram found — generating initial diagram from Terraform files."
          mkdir -p "${{ inputs.docs_path }}"

          {
            echo "/aws-architecture-diagram"
            echo "IMPORTANT: This is a CI environment. Do NOT ask any questions. Use English and make sensible defaults for all preferences."
            echo "Generate an AWS architecture diagram from the following Terraform files."
            echo "Write the diagram to ${DRAWIO_FILE} and the companion guide to ${GUIDE_FILE}"
            echo ""
            echo "Terraform files:"
            find "${{ inputs.terraform_path }}" -name "*.tf" | sort | while read f; do
              echo "=== $f ==="
              cat "$f"
              echo ""
            done
          } > initial_prompt.txt

          claude -p "$(cat initial_prompt.txt)" --output-format text --dangerously-skip-permissions
          rm initial_prompt.txt

      - name: Read existing diagram & summary
        id: read_files
        run: |
          DRAWIO_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.drawio"
          GUIDE_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.md"

          XML=$(cat "$DRAWIO_FILE" 2>/dev/null || echo "")
          SUMMARY=$(cat "$GUIDE_FILE" 2>/dev/null || echo "")

          DELIM=$(uuidgen)
          echo "xml<<${DELIM}" >> $GITHUB_OUTPUT
          echo "$XML" >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT
          echo "summary<<${DELIM}" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT

      - name: Call Claude for incremental review
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIAGRAM_XML: ${{ steps.read_files.outputs.xml }}
          DIAGRAM_SUMMARY: ${{ steps.read_files.outputs.summary }}
        run: |
          DRAWIO_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.drawio"
          GUIDE_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.md"

          {
            echo "/aws-architecture-review"
            echo "Diff JSON:"
            cat diff.json
            echo ""
            echo "Existing diagram XML:"
            echo "${DIAGRAM_XML}"
            echo ""
            echo "Existing summary:"
            echo "${DIAGRAM_SUMMARY}"
            echo ""
            echo "Write the updated diagram to ${DRAWIO_FILE}"
            echo "Write the updated companion guide to ${GUIDE_FILE}"
            echo ""
            echo "For your PR review summary:"
            echo "- Do NOT include any narration about writing files (e.g. 'Both files are written', 'docs/architecture.drawio and docs/architecture.md are updated', 'Here is the summary', '---' separators)"
            echo "- Start directly with the summary content"
            echo "- Include a Risk column in the resource table (values: HIGH / MEDIUM / LOW / none)"
            echo "- If there are HIGH or MEDIUM risks, wrap a consolidated risks block between ### RISKS_START and ### RISKS_END"
            echo "- If there are no HIGH or MEDIUM risks, omit the RISKS markers entirely"
          } > prompt.txt

          RESPONSE=$(claude -p "$(cat prompt.txt)" --output-format text --dangerously-skip-permissions 2>&1) || true

          if [[ -z "$RESPONSE" ]]; then
            echo "Claude returned empty response"
            exit 1
          fi

          if echo "$RESPONSE" | grep -qi "error\|failed\|unauthorized\|credit\|billing"; then
            echo "Claude returned an error:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$RESPONSE" > review-output.txt
          echo "=== Claude Response ==="
          echo "$RESPONSE"
          echo "=== End Claude Response ==="

          # Extract risks block if present
          RISKS=$(echo "$RESPONSE" | sed -n '/### RISKS_START/,/### RISKS_END/p' | sed '1d;$d')

          # Strip risks markers, standalone --- dividers, and any narration lines
          # (lines that contain file paths or transitional phrases before the actual content)
          CLEAN_RESPONSE=$(echo "$RESPONSE" \
            | sed '/### RISKS_START/,/### RISKS_END/d' \
            | sed '/^---$/d' \
            | sed '/\.drawio.*\.md.*updated/d' \
            | sed '/^Here is/d' \
            | sed '/^Both files/d' \
            | sed '/^The files/d')

          # Compute diff stats from diff.json
          ADDED=$(jq '.resources_added_or_modified | length' diff.json)
          DELETED=$(jq '.resources_deleted | length' diff.json)

          DELIM=$(uuidgen)
          echo "response<<${DELIM}" >> $GITHUB_OUTPUT
          echo "$CLEAN_RESPONSE" >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT
          echo "risks<<${DELIM}" >> $GITHUB_OUTPUT
          echo "$RISKS" >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT

      - name: Export diagram to PNG
        run: |
          sudo apt-get install -y xvfb libgbm1 libasound2t64 libnotify4 libsecret-1-0
          DRAWIO_VERSION="24.7.17"
          wget -q "https://github.com/jgraph/drawio-desktop/releases/download/v${DRAWIO_VERSION}/drawio-amd64-${DRAWIO_VERSION}.deb"
          sudo dpkg -i "drawio-amd64-${DRAWIO_VERSION}.deb" || sudo apt-get install -f -y
          PNG_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.png"
          DRAWIO_FILE="${{ inputs.docs_path }}/${{ inputs.diagram_name }}.drawio"

          xvfb-run -a drawio --export --format png \
            --output "$PNG_FILE" \
            --no-sandbox "$DRAWIO_FILE"

          if [[ ! -f "$PNG_FILE" ]]; then
            echo "ERROR: PNG export failed — $PNG_FILE was not created"
            ls -la "${{ inputs.docs_path }}/"
            exit 1
          fi
          echo "PNG export succeeded: $PNG_FILE ($(du -h "$PNG_FILE" | cut -f1))"

      - name: Commit updated diagram and review
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            "${{ inputs.docs_path }}/${{ inputs.diagram_name }}.drawio" \
            "${{ inputs.docs_path }}/${{ inputs.diagram_name }}.md" \
            "${{ inputs.docs_path }}/${{ inputs.diagram_name }}.png" \
            review-output.txt
          git commit -m "Auto-update AWS diagram via architecture-review skill" || echo "No changes to commit"
          git push

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.claude.outputs.response }}
          RISKS: ${{ steps.claude.outputs.risks }}
          ADDED: ${{ steps.claude.outputs.added }}
          DELETED: ${{ steps.claude.outputs.deleted }}
          DOCS_PATH: ${{ inputs.docs_path }}
          DIAGRAM_NAME: ${{ inputs.diagram_name }}
        with:
          script: |
            const added = parseInt(process.env.ADDED) || 0;
            const deleted = parseInt(process.env.DELETED) || 0;
            const total = added + deleted;
            const docsPath = process.env.DOCS_PATH;
            const diagramName = process.env.DIAGRAM_NAME;
            const { owner, repo } = context.repo;
            const branch = context.payload.pull_request.head.ref;

            const rawBase = `https://github.com/${owner}/${repo}/raw/${branch}`;
            const blobBase = `https://github.com/${owner}/${repo}/blob/${branch}`;

            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const statsLine = `**${total} resource(s) changed** — ${added} added/modified, ${deleted} removed`;

            const risksSection = process.env.RISKS?.trim()
              ? `\n\n### ⚠️ Architecture Risks\n\n${process.env.RISKS.trim()}`
              : '';

            const body = [
              '## 🏗️ AWS Architecture Review',
              '',
              statsLine,
              risksSection,
              '',
              process.env.REVIEW_BODY.trim(),
              '',
              '---',
              '',
              `![Architecture Diagram](${rawBase}/${docsPath}/${diagramName}.png)`,
              '',
              `📖 [View companion guide](${blobBase}/${docsPath}/${diagramName}.md) · 🔍 [View workflow run](${runUrl})`,
            ].join('\n');

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            })
