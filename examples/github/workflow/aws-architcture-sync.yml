name: AWS Architecture Sync

on:
  pull_request:
    paths:
      - 'infra/terraform/aws/**'
  workflow_dispatch:

jobs:
  architecture-review:
    uses: cloudaifusion/sdlc-automation/.github/workflows/aws-architecture-sync.yml@main
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    with:
      terraform_path: infra/terraform/aws
      docs_path: docs
      diagram_name: architecture
      pr_number: ${{ github.event.pull_request.number }}
      aws_role_arn: ${{ vars.AWS_ROLE_ARN }}
      aws_bedrock_model: ${{ vars.BEDROCK_MODEL_ID }}
      aws_region: ${{ vars.AWS_REGION }}
      use_bedrock: ${{ vars.USE_BEDROCK }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
